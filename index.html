<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paid Media Dashboard</title>
  
  <!-- PapaParse desde CDN para parsear CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <style>
    /* ============================================
       Reset y tipografía base
       ============================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b; /* zinc-950 */
      color: #e4e4e7; /* zinc-200 */
      min-height: 100vh;
      padding: 2rem;
    }
    
    /* ============================================
       Layout
       ============================================ */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #fafafa;
    }
    
    .subtitle {
      color: #71717a; /* zinc-500 */
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }
    
    /* ============================================
       Estado de carga / error
       ============================================ */
    .loading, .error {
      padding: 2rem;
      text-align: center;
      background: #18181b; /* zinc-900 */
      border-radius: 0.5rem;
      margin: 2rem 0;
    }
    
    .error {
      background: #450a0a;
      color: #fca5a5;
    }
    
    /* ============================================
       Sección de debug (temporal)
       ============================================ */
    .debug-section {
      margin-bottom: 2rem;
      background: #18181b;
      border-radius: 0.5rem;
      padding: 1.5rem;
      border: 1px solid #27272a; /* zinc-800 */
    }
    
    .debug-section h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #fafafa;
    }
    
    .debug-section pre {
      background: #09090b;
      padding: 1rem;
      border-radius: 0.375rem;
      font-size: 0.75rem;
      max-height: 300px;
      overflow: auto;
      color: #d4d4d8;
    }
    
    .badge {
      display: inline-block;
      background: #27272a;
      color: #a1a1aa;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Paid Media Dashboard</h1>
        <p class="subtitle" id="last-updated">Cargando datos...</p>
      </div>
    </header>
    
    <div id="app">
      <div class="loading">Cargando datos...</div>
    </div>
  </div>

  <script>
    // ============================================
    // CONFIGURACIÓN - URLs de los CSVs
    // ============================================
    const CONFIG = {
      CSV_CLIENTES: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEH7G_E1uEjoivg5QjyW6iyN3PFFw6Q-w-HX3S7FrF7svXTkvYHX-TINb47bmiNTbdBUn7tl5icM8X/pub?gid=2070065787&single=true&output=csv',
      CSV_PRESUPUESTOS: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEH7G_E1uEjoivg5QjyW6iyN3PFFw6Q-w-HX3S7FrF7svXTkvYHX-TINb47bmiNTbdBUn7tl5icM8X/pub?gid=0&single=true&output=csvI',
      CSV_HISTORICO: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEH7G_E1uEjoivg5QjyW6iyN3PFFw6Q-w-HX3S7FrF7svXTkvYHX-TINb47bmiNTbdBUn7tl5icM8X/pub?gid=249745944&single=true&output=csv ',
    };
    
    // ============================================
    // FETCHING Y PARSING DE CSV
    // ============================================
    async function fetchCsv(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} - ${url}`);
      }
      const text = await response.text();
      
      const parsed = Papa.parse(text, {
        header: true,
        skipEmptyLines: true,
        dynamicTyping: true,
      });
      
      return parsed.data;
    }
    
    async function loadAllData() {
      const [clientes, presupuestos, historico] = await Promise.all([
        fetchCsv(CONFIG.CSV_CLIENTES),
        fetchCsv(CONFIG.CSV_PRESUPUESTOS),
        fetchCsv(CONFIG.CSV_HISTORICO),
      ]);
      return { clientes, presupuestos, historico };
    }
    
    // ============================================
    // RENDER - PLAYGROUND DE DATOS CRUDOS
    // ============================================
    function renderPlayground(data) {
      const { clientes, presupuestos, historico } = data;
      
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="debug-section">
          <h2>Clientes <span class="badge">${clientes.length} filas</span></h2>
          <pre>${JSON.stringify(clientes, null, 2)}</pre>
        </div>
        
        <div class="debug-section">
          <h2>Presupuestos del mes <span class="badge">${presupuestos.length} filas</span></h2>
          <pre>${JSON.stringify(presupuestos, null, 2)}</pre>
        </div>
        
        <div class="debug-section">
          <h2>Historico de Gasto <span class="badge">${historico.length} filas</span></h2>
          <pre>${JSON.stringify(historico.slice(0, 20), null, 2)}</pre>
          <p style="color: #71717a; font-size: 0.75rem; margin-top: 0.5rem;">
            Mostrando los primeros 20 de ${historico.length} registros.
          </p>
        </div>
      `;
      
      // Actualizar el subtitle con la hora de carga
      const now = new Date().toLocaleString('es-ES');
      document.getElementById('last-updated').textContent = `Última actualización: ${now}`;
    }
    
    // ============================================
    // INICIALIZACIÓN
    // ============================================
    async function init() {
      try {
        const data = await loadAllData();
        renderPlayground(data);
      } catch (error) {
        document.getElementById('app').innerHTML = `
          <div class="error">
            <h2 style="margin-bottom: 1rem;">Error cargando datos</h2>
            <p>${error.message}</p>
            <p style="margin-top: 1rem; font-size: 0.875rem;">
              Revisá que las URLs en CONFIG estén bien configuradas y que los CSVs sean accesibles públicamente.
            </p>
          </div>
        `;
        console.error(error);
      }
    }
    
    init();
  </script>
</body>
</html>
